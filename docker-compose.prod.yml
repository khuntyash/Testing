services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.production
    environment:
      LABELHUB_DB_PATH: /app/data/labelhub.db
      DISABLE_EMBEDDED_WORKER: "1"
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "worker.py"]
    env_file:
      - .env.production
    environment:
      LABELHUB_DB_PATH: /app/data/labelhub.db
      DISABLE_EMBEDDED_WORKER: "1"
    volumes:
      - app_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app_data:
